name: Build DEB package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot rsync desktop-file-utils

      - name: Make build script executable
        run: |
          chmod +x packaging/deb/build_deb.sh

      - name: Build deb package
        run: |
          ./packaging/deb/build_deb.sh

      - name: Collect deb artifact
        run: |
          set -e

          mkdir -p artifacts

          DEB_FILE="$(find build -maxdepth 1 -type f -name "penzugyi-naplo_*_all.deb" -print -quit)"

          if [ -z "$DEB_FILE" ]; then
            echo "Nem található .deb fájl a build mappában."
            exit 1
          fi

          APP_VERSION="$(python - <<'PY'
          from penzugyi_naplo.app_version import APP_VERSION
          print(APP_VERSION.replace("~", "-"))
          PY
          )"

          cp "$DEB_FILE" "artifacts/penzugyi-naplo.${APP_VERSION}.deb"

          ls -l artifacts/

      - name: Upload deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: penzugyi-naplo-deb
          path: artifacts/*.deb
