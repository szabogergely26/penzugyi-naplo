name: Publish APT repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-apt-repo:
    runs-on: ubuntu-latest

    steps:
      # A repository teljes tartalmának letöltése a GitHub Actions futtatókörnyezetbe.
      - name: Checkout repository
        uses: actions/checkout@v4

      # A .deb építéséhez, az APT index generálásához és a GPG aláíráshoz szükséges csomagok.
      - name: Install repository build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot rsync gzip coreutils gnupg

      # A csomagépítő script futtathatóvá tétele.
      - name: Make build script executable
        run: |
          chmod +x packaging/deb/build_deb.sh

      # A projekt .deb csomagjának elkészítése.
      # A build_deb.sh jelenleg ezt hozza létre:
      # build/penzugyi-naplo_0.1.2_all.deb
      - name: Build deb package
        run: |
          ./packaging/deb/build_deb.sh

      # APT repository mappaszerkezet létrehozása.
      # Ebből lesz majd a GitHub Pages-re feltöltött csomagforrás.
      - name: Create APT repository structure
        run: |
          set -e

          # Alap csomag- és repository változók.
          PACKAGE_NAME="penzugyi-naplo"
          REPO_DIR="apt-repo"
          POOL_DIR="$REPO_DIR/pool/main/p/$PACKAGE_NAME"
          DIST_DIR="$REPO_DIR/dists/stable"
          BINARY_DIR="$DIST_DIR/main/binary-all"

          # Megkeressük az előző lépésben elkészült .deb csomagot.
          DEB_FILE="$(find build -maxdepth 1 -type f -name "${PACKAGE_NAME}_*_all.deb" -print -quit)"

          # Ha nincs .deb fájl, akkor nincs mit publikálni.
          if [ -z "$DEB_FILE" ]; then
            echo "Nem található .deb fájl a build mappában."
            exit 1
          fi

          # Régi ideiglenes repo törlése, majd új mappaszerkezet létrehozása.
          rm -rf "$REPO_DIR"

          mkdir -p "$POOL_DIR"
          mkdir -p "$BINARY_DIR"

          # A publikus APT kulcs kikerül a repo gyökerébe.
          # Innen lehet majd letölteni:
          # https://szabogergely26.github.io/penzugyi-naplo/penzugyi-naplo-archive-keyring.gpg
          cp packaging/apt/penzugyi-naplo-archive-keyring.gpg "$REPO_DIR/"

          # A .deb csomag átmásolása a Debian/Ubuntu-szerű pool struktúrába.
          cp "$DEB_FILE" "$POOL_DIR/"

          # Innentől az APT repo gyökerében dolgozunk.
          cd "$REPO_DIR"

          # Packages index generálása.
          # Ez mondja meg az APT-nek, milyen csomagok vannak a repository-ban.

          echo "==> Packages index generálása"
          dpkg-scanpackages --arch all pool /dev/null > dists/stable/main/binary-all/Packages

          # Tömörített Packages index generálása.

          echo "==> Packages.gz generálása"
          gzip -9 -k -f dists/stable/main/binary-all/Packages

          # Innentől a stable disztribúció mappájában dolgozunk.
          cd dists/stable

          # Release fájl létrehozása.
          # Ez a repository metaadatait és az indexfájlok ellenőrzőösszegeit fogja tartalmazni.
          # Release metaadat-fájl létrehozása.
          # Ezt olvassa az APT, amikor a repository adatait ellenőrzi.
          
          echo "==> Release fájl létrehozása"
            {
              printf '%s\n' "Origin: Penzugyi Naplo"
              printf '%s\n' "Label: Penzugyi Naplo"
              printf '%s\n' "Suite: stable"
              printf '%s\n' "Codename: stable"
              printf '%s\n' "Architectures: all"
              printf '%s\n' "Components: main"
              printf '%s\n' "Description: APT repository for Penzugyi Naplo"
              printf '%s\n' "Date: $(date -Ru)"
            } > Release

          # MD5 ellenőrzőösszegek hozzáadása a Release fájlhoz.
          echo "MD5Sum:" >> Release
          for file in main/binary-all/Packages main/binary-all/Packages.gz; do
            printf " %s %16s %s\n" "$(md5sum "$file" | cut -d' ' -f1)" "$(stat -c%s "$file")" "$file" >> Release
          done

          # SHA1 ellenőrzőösszegek hozzáadása a Release fájlhoz.
          echo "SHA1:" >> Release
          for file in main/binary-all/Packages main/binary-all/Packages.gz; do
            printf " %s %16s %s\n" "$(sha1sum "$file" | cut -d' ' -f1)" "$(stat -c%s "$file")" "$file" >> Release
          done

          # SHA256 ellenőrzőösszegek hozzáadása a Release fájlhoz.
          # Ezt használják ma leginkább az APT repo integritásának ellenőrzésére.
          echo "SHA256:" >> Release
          for file in main/binary-all/Packages main/binary-all/Packages.gz; do
            printf " %s %16s %s\n" "$(sha256sum "$file" | cut -d' ' -f1)" "$(stat -c%s "$file")" "$file" >> Release
          done

      # A GitHub Secretben tárolt privát GPG kulcs importálása.
      # A secret neve: APT_GPG_PRIVATE_KEY
      - name: Import GPG signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          set -e

          # GPG konfigurációs mappa létrehozása megfelelő jogosultságokkal.
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          # Privát kulcs importálása a GitHub Secretből.
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import

          # Ellenőrzés: legyen elérhető legalább egy titkos kulcs.
          gpg --list-secret-keys --keyid-format=long

      # A Release fájl GPG aláírása.
      # Ebből lesz:
      # - InRelease: egybefűzött, aláírt Release fájl
      # - Release.gpg: külön aláírás a Release fájlhoz
      - name: Sign APT repository
        env:
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          set -e

          # A Release fájl helye.
          cd apt-repo/dists/stable

          # Az importált GPG kulcs azonosítójának kinyerése.
          GPG_KEY_ID="$(gpg --list-secret-keys --keyid-format=long | awk '/sec/{print $2}' | cut -d'/' -f2 | head -n1)"

          echo "Using GPG key: $GPG_KEY_ID"

          # InRelease generálása.
          # Ez a modern APT kliensek által preferált aláírt Release fájl.
          gpg --batch --yes \
            --pinentry-mode loopback \
            --passphrase "$APT_GPG_PASSPHRASE" \
            --default-key "$GPG_KEY_ID" \
            --clearsign \
            --output InRelease \
            Release

          # Release.gpg generálása.
          # Ez a különálló aláírás a Release fájlhoz.
          gpg --batch --yes \
            --pinentry-mode loopback \
            --passphrase "$APT_GPG_PASSPHRASE" \
            --default-key "$GPG_KEY_ID" \
            --detach-sign \
            --armor \
            --output Release.gpg \
            Release

      # Az elkészült APT repository publikálása a gh-pages branchre.
      # A GitHub Pages innen fogja kiszolgálni a csomagforrást.
      - name: Deploy APT repository to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Külön mappa készítése a publikálandó tartalomnak.
          mkdir gh-pages
          cp -a apt-repo/. gh-pages/

          cd gh-pages

          # GitHub Pages esetén kikapcsoljuk a Jekyll feldolgozást.
          touch .nojekyll

          # Ideiglenes Git repository inicializálása a gh-pages tartalomhoz.
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # A teljes tartalmat a gh-pages branch gyökerébe commitoljuk.
          git checkout -b gh-pages
          git add -A
          git commit -m "Publish APT repository"

          # A gh-pages branch felülírása az új APT repo tartalommal.
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
